services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY_PATH=/secrets/github-app.pem
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://preflight:preflight@db:5432/preflight
      - ADO_PAT=${ADO_PAT:-}
      - ADO_WEBHOOK_USER=${ADO_WEBHOOK_USER:-}
      - ADO_WEBHOOK_PASSWORD=${ADO_WEBHOOK_PASSWORD:-}
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      - redis
      - db
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY_PATH=/secrets/github-app.pem
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://preflight:preflight@db:5432/preflight
      - ADO_PAT=${ADO_PAT:-}
      - ADO_WEBHOOK_USER=${ADO_WEBHOOK_USER:-}
      - ADO_WEBHOOK_PASSWORD=${ADO_WEBHOOK_PASSWORD:-}
    volumes:
      - ./secrets:/secrets:ro
    depends_on:
      - redis
      - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: preflight
      POSTGRES_PASSWORD: preflight
      POSTGRES_DB: preflight
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
